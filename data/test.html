<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu Hình ESP32</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 600;
            font-size: 24px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .section-title {
            margin: 25px 0 15px 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        #statusMessage {
            display: none;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>ESP32 Device Config</h2>
            <p>Thiết lập thông số kỹ thuật cho hệ thống nhúng của bạn tại runtime.</p>
        </div>

        <form id="configForm">
            <div class="section-title">Wi-Fi Network</div>
            <div class="form-group">
                <label for="ssid">Tên WiFi (SSID)</label>
                <input type="text" id="ssid" placeholder="Nhập tên WiFi" required>
            </div>
            
            <div class="form-group">
                <label for="pass">Mật khẩu WiFi</label>
                <input type="password" id="pass" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="section-title">CoreIOT Platform</div>
            <div class="form-group">
                <label for="server">Địa chỉ Server (Broker)</label>
                <input type="text" id="server" value="app.coreiot.io" required>
            </div>

            <div class="form-group" style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label for="port">Cổng (Port)</label>
                    <input type="number" id="port" value="1883" required>
                </div>
            </div>

            <div class="form-group">
                <label for="token">Access Token (Thiết bị)</label>
                <input type="text" id="token" placeholder="Ví dụ: g7drm1am..." required>
            </div>

            <button type="submit" class="btn-submit">Lưu & Khởi động lại mạng</button>
            <div id="statusMessage"></div>
        </form>
    </div>

    <script>
        document.getElementById("configForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const btn = document.querySelector(".btn-submit");
            const statusMsg = document.getElementById("statusMessage");
            
            // Effect
            btn.innerHTML = "Đang gửi dữ liệu...";
            btn.style.opacity = 0.7;
            btn.disabled = true;

            const ssid = encodeURIComponent(document.getElementById("ssid").value);
            const pass = encodeURIComponent(document.getElementById("pass").value);
            const server = encodeURIComponent(document.getElementById("server").value);
            const port = encodeURIComponent(document.getElementById("port").value);
            const token = encodeURIComponent(document.getElementById("token").value);

            const url = `/connect?ssid=${ssid}&pass=${pass}&server=${server}&port=${port}&token=${token}`;

            fetch(url)
                .then(response => response.text())
                .then(text => {
                    statusMsg.style.display = "block";
                    statusMsg.className = "success";
                    statusMsg.innerHTML = "💾 " + text;
                    btn.innerHTML = "Thành công!";
                })
                .catch(err => {
                    statusMsg.style.display = "block";
                    statusMsg.className = "error";
                    statusMsg.innerHTML = "⚠️ Mất kết nối tới ESP32 (Thiết bị có thể đang Restart mạng).";
                    btn.innerHTML = "Đã gửi ngắt kết nối";
                });
        });
    </script>
</body>
</html>
