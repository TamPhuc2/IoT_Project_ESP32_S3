<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Cảm Biến IoT trên YOLO_UNO</title>

  <!-- Liên kết CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- //<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
</head>

<body>
  <!-- <h1>
    Dashboard Cảm Biến IoT trên YOLO_UNO
  </h1> -->
  <div class="page-title">
    Dashboard Cảm Biến IoT trên YOLO_UNO
  </div>
  <div class="top-bar">
    <div class="left-text">Giám sát và điều khiển thiết bị theo thời gian thực</div>
    <div class="right-text">
      <img src="icon\connect.png" alt="Icon" style="width:24px; vertical-align:middle; margin-right:8px;">
      Đang kết nối
    </div>
  </div>
  <div class="grid-container">
    <div class="card temperature">
      <div class="header">
        <h2>Nhiệt Độ</h2>
        <img src="icon\temperature.png" alt="Icon" style="width:24px; vertical-align:middle; margin-right:8px;">
      </div>
      <div class="value">
      <div class="sensor">
        <span id="temp">--</span>
      </div>
      </div>
      <div id="tempChange"></div>
    </div>

    <div class="card humidity">
      <div class="header">
        <h2>Độ ẩm</h2>
        <img src="icon\humidity.png" alt="Icon" style="width:24px; vertical-align:middle; margin-right:8px;">
      </div>
      <div class="value">
      <div class="sensor">
        <span id="hum">--</span>
      </div>
      </div> 
      <div id="humChange"></div>
    </div>

<div class="card control">
      <div class="header">
        <h1>Bảng điều khiển chính</h1>
      </div>

      <div class="control-row">
      <h2>
        <img src="icon\lamp.png" alt="Icon" style="width:24px; vertical-align:middle; margin-right:8px;">
        Đèn 1 
      </h2>
      <button id="btn-led1" class="btn-led1">Bật Đèn</button>
      </div>
      <div class="control-row">
      <h2>
        <img src="icon\lamp.png" alt="Icon" style="width:24px; vertical-align:middle; margin-right:8px;">
        Đèn 2 
      </h2>
      <button id="btn-led2" class="btn-led2">Bật Đèn</button>
      </div>

      <h2>  
        <div class="control-center">
          <button id="btn-refresh" class="btn-refresh">Làm Mới Dữ Liệu</button>
          <button id="btn-off" class="btn-off">Tắt Tất Cả Thiết Bị</button>
        </div>
      </h2>
    </div>
  

    <div class="card chart-temp">
      <div class="header">
        <h2>Biểu đồ nhiệt độ</h2>
      </div>
      <canvas id="tempChart"></canvas>
    </div>

    <div class="card chart-hum">
      <div class="header">
        <h2>Biểu đồ độ ẩm </h2>
      </div>
      <canvas id="humChart"></canvas>
    </div>
</div>
    
  <!-- Chart.js -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> -->
  <script src="chart.js"></script>
  <!-- JS của bạn -->
  <script src="script.js"></script>
</body>
</html>
